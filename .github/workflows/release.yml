name: CI 

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Eigen3
        run: sudo apt-get install -y libeigen3-dev
      
      - name: Build
        run: |
          mkdir build
          cd build
          cmake ..
          make
      
      - name: Create package (tar.gz)
        run: |
          mkdir package
          cp build/mnist package/
          cp helpers.h package/ 2>/dev/null || true
          cd package
          tar -czf ../mnist_classifier.tar.gz *
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: mnist-classifier
          path: mnist_classifier.tar.gz
